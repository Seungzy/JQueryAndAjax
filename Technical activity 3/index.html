<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Products Catalog</title>
  <link rel="preconnect" href="https://code.jquery.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="wrap header-container">
      <div class="brand">
        <h1>Z Shop</h1>
      </div>

      <div class="search-bar">
        <input id="productSearch" type="search" placeholder="Search products…" autocomplete="off" />
      </div>

      <div class="header-actions">
        <button id="reloadBtn" type="button">Refresh</button>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>
    </div>
  </header>

  <main class="wrap">
    <section class="grid">
      <aside class="sidebar" aria-label="Products list">
        <div class="sidebar-header">
          <h2>Products</h2>
          <div class="pill" id="countPill">0</div>
        </div>
        <ul id="productList" class="product-list"></ul>
      </aside>

      <section class="content" aria-label="Product details">
        <div id="productDetails" class="details"></div>
        <pre id="rawJson" class="raw" hidden></pre>
      </section>
    </section>

    <footer class="footer">
      <small>
         &copy; 2026 Technical Assessment 3
      </small>
    </footer>
  </main>

  <!-- this is the jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
